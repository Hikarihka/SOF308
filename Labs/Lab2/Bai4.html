<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta Be="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <script src="js/bootstrap.bundle.min.js"></script>
    <title>Bài 4</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
</head>
<body>
    <div class="container mt-3">
        <h3>Bài tập ứng dụng Model cho Tài khoản</h3>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#myModal">
            Tài Khoản
        </button>
    </div>

    <!-- The Modal -->
    <div class="modal" id="myModal">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h4 class="modal-title">ĐĂNG NHẬP/ĐĂNG KÝ</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <ul class="nav nav-tabs" role="tablist">
            <li class="nav-item">
                <a class="nav-link active" data-bs-toggle="tab" href="#register">Đăng Ký</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="tab" href="#login">Đăng Nhập</a>
            </li>
            <li class="nav-item">
            </li>
        </ul>

        <div class="tab-content">
            <div class="container tab-pane active" id="register"><br>
            <form action="submit" class="card p-3">
                    <div class="mb-3">
                        <label for="username" class="form-label">Họ Và Tên </label>
                        <input type="text" class="form-control" id="username" placeholder="Nhập họ và tên" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            Email
                        </label>
                        <input type="email" class="form-control" placeholder="Nhập email">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Số Điện Thoại</label>
                        <input type="text" class="form-control" placeholder="Nhập số điện thoại">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mật Khẩu</label>
                        <input type="password" class="form-control" placeholder="Nhập mật khẩu">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Xác Nhận Mật Khẩu</label>
                        <input type="password" class="form-control" placeholder="Xác nhận mật khẩu">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Giới Tính:</label>
                        
                            <input type="radio" class="form-check-input" id="male" name="gender" value="male">
                            <label class="form-check-label" for="male">Nam</label>
                        
                        
                            <input type="radio" class="form-check-input" id="female" name="gender" value="female">
                            <label class="form-check-label" for="female">Nữ</label>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ngôn ngữ</label>
                        <select class="form-select">
                            <option value="vi">Tiếng Việt</option>
                            <option value="en">English</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <input type="checkbox"> Tôi đồng ý với các điều khoản và chính sách bảo mật
                    </div>
                    <div class="mt-3">
                        <button class="btn btn-info text-light px-4">Đăng Ký</button>
                    </div>
                </form>
            </div>
            <div class="container tab-pane fade" id="login"><br>
                <form class="card p-3">
                    <div class="mb-3">
                        <label for="login-email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="login-email" placeholder="Nhập email">
                    </div>
                    <div class="mb-3">
                        <label for="login-password" class="form-label">Mật Khẩu</label>
                        <input type="password" class="form-control" id="login-password" placeholder="Nhập mật khẩu">
                    </div>
                    <div class="mt-3">
                        <button class="btn btn-info text-light px-4">Đăng Nhập</button>
                    </div>
                </form>
            </div>
        </div>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
