<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta Be="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <script src="js/bootstrap.bundle.min.js"></script>
    <title>Bài 1</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-sm-12">
                <h2 class="text-center" style="color: red;">Bảng Thần Phần Dinh Dưỡng</h2>
                <table class="table table-bordered" >
                    <tbody>
                        <tr class="table-warning text-center align-middle">
                            <td rowspan="2" class=""><b>Thành Phần</b></td>
                            <td colspan="2"><b>Giá Trị</b></td>
                        </tr>
                        <tr class="table-warning align-middle text-bold">
                            <td><b>Khối Lượng</b></td>
                            <td><b>% DV*</b></td>
                        </tr>
                        <tr>
                            <td>Calories</td>
                            <td>200 kcal</td>
                            <td>20%</td>
                        </tr>
                        <tr>
                            <td>Chất Béo</td>
                            <td>9g</td>
                            <td>14%</td>
                        </tr>
                        <tr>
                            <td>Chất Béo Bão Hòa</td>
                            <td>4g</td>
                            <td>20%</td>
                        </tr>
                        <tr>
                            <td>Chất Đạm</td>
                            <td>8g</td>
                            <td>16%</td>
                        </tr>
                        <tr>
                            <td>Chất Xơ</td>
                            <td>5g</td>
                            <td>20%</td>
                        </tr>
                        <tr>
                            <td>Đường</td>
                            <td>12g</td>
                            <td>-</td>
                        </tr>
                        <tr>
                            <td rowspan="2">Vitamin</td>
                            <td>Vitamin C</td>
                            <td>25%%</td>
                        </tr>
                        <tr>
                            <td>Vitamin D</td>
                            <td>10%</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
